site_name: FluentLoop Docs
site_description: Documentação oficial do FluentLoop — AI-powered English conversation practice
site_url: https://goliverpro.github.io/fluentloop-docs
repo_url: https://github.com/goliverpro/fluentloop-docs
repo_name: fluentloop-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
    - toc.integrate

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Produto:
    - Visão Geral: product/index.md
    - Visão do Produto: product/vision.md
    - Personas: product/personas.md
    - Roadmap: product/roadmap.md
  - Requisitos:
    - Visão Geral: requirements/index.md
    - Requisitos Funcionais: requirements/functional.md
    - Requisitos Não-Funcionais: requirements/non-functional.md
    - Casos de Uso: requirements/use-cases.md
  - Arquitetura:
    - Visão Geral: architecture/index.md
    - Overview Técnico: architecture/overview.md
    - SDD: architecture/sdd.md
    - Modelo de Dados: architecture/data-model.md
    - Repositórios: architecture/repositories.md
    - ADRs: adr/index.md
    - ADRs (lista): architecture/adrs.md
  - Design:
    - Visão Geral: design/index.md
    - Style Guide: design/style-guide.md
    - Wireframes: design/wireframes.md
  - Desenvolvimento:
    - Convenções: dev/conventions.md
    - Workflow: dev/workflow.md
  - Testes:
    - Estratégia: testing/index.md
    - CI/CD: testing/strategy.md
  - Deploy:
    - Visão Geral: deployment/index.md
    - Ambientes: deployment/environments.md
    - CI/CD: deployment/cicd.md
